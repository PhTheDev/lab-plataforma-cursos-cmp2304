<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meus Cursos — Plataforma de Cursos</title>
    <meta name="description" content="Área do aluno — acesse seus cursos e assista às aulas." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="./styles.css" />
</head>

<body class="bg-light">

    <!-- Navbar do Aluno -->
    <nav class="app-header is-scrolled">
        <div class="container app-header-inner">
            <a class="app-brand" href="aluno.html" aria-label="Meus cursos">
                <span class="brand-accent">&lt;/</span><span class="brand-name">PH</span><span
                    class="brand-accent">&gt;</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <a id="adminPanelLink" href="admin.html" class="header-link d-none" title="Painel Admin">
                    <i class="bi bi-shield-fill-check text-accent"></i>
                    <span class="d-none d-md-inline">Admin</span>
                </a>
                <span class="user-greeting">
                    <i class="bi bi-person-circle me-1 text-accent"></i>
                    <span id="alunoUserName">Aluno</span>
                </span>
                <button id="btnLogout" class="btn-logout" title="Sair">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- ══════════════════════════════════════════════════════════════════════════ -->
    <!-- VIEW: Catálogo                                                            -->
    <!-- ══════════════════════════════════════════════════════════════════════════ -->
    <main id="viewCatalogo" class="container py-4">
        <header class="mb-5 hero-panel p-4 p-md-5">
            <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
                <div>
                    <h1 class="h3 mb-1 mt-2">
                        <i class="bi bi-collection-play-fill me-2 text-accent"></i>Meus Cursos
                    </h1>
                    <p class="text-secondary mb-0">Explore o catálogo e continue de onde parou.</p>
                </div>
                <span class="badge text-bg-primary p-2 fs-6">
                    <i class="bi bi-mortarboard me-1"></i>Área do Aluno
                </span>
            </div>
        </header>

        <div id="cursosGrid" class="row g-4">
            <!-- Cards renderizados pelo AlunoController -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-accent" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- ══════════════════════════════════════════════════════════════════════════ -->
    <!-- VIEW: Player                                                              -->
    <!-- ══════════════════════════════════════════════════════════════════════════ -->
    <main id="viewPlayer" class="d-none player-layout">

        <!-- Sidebar de aulas -->
        <aside class="player-sidebar">
            <div class="sidebar-header">
                <button id="btnVoltarCatalogo" class="btn-back" title="Voltar ao catálogo">
                    <i class="bi bi-arrow-left me-2"></i>Catálogo
                </button>
                <h2 id="playerCursoTitulo" class="sidebar-curso-titulo">Curso</h2>
            </div>
            <div id="playerSidebar" class="sidebar-content">
                <!-- Módulos e aulas renderizados pelo AlunoController -->
            </div>
        </aside>

        <!-- Área principal do player -->
        <section class="player-main">
            <div class="player-top-bar">
                <h3 id="playerAulaTitulo" class="player-aula-titulo">Selecione uma aula</h3>
                <button id="btnMarcarConcluida" class="btn btn-outline-success btn-sm" data-aula-id="">
                    <i class="bi bi-check-circle me-2"></i>Marcar como concluída
                </button>
            </div>

            <div id="playerContent" class="player-content">
                <div class="d-flex flex-column align-items-center justify-content-center h-100 text-muted gap-3">
                    <i class="bi bi-play-circle fs-1 opacity-50"></i>
                    <p class="mb-0">Selecione uma aula na lista ao lado</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer mt-4">
        <div class="container py-4">
            <div class="row align-items-center g-3">
                <div class="col-12 col-md-6 text-center text-md-start">
                    <a class="footer-brand" href="aluno.html">
                        <span class="brand-accent">&lt;/</span>PH<span class="brand-accent">&gt;</span>
                    </a>
                </div>
                <div class="col-12 col-md-6 text-center text-md-end">
                    <div class="footer-social justify-content-center justify-content-md-end">
                        <a href="https://github.com/PhTheDev" target="_blank" rel="noopener noreferrer"
                            aria-label="GitHub">
                            <i class="bi bi-github"></i>
                        </a>
                        <a href="https://www.linkedin.com/in/pedro-henrique-faria-6b22932a7/" target="_blank"
                            rel="noopener noreferrer" aria-label="LinkedIn">
                            <i class="bi bi-linkedin"></i>
                        </a>
                    </div>
                </div>
            </div>
            <div class="footer-copy">
                <p class="mb-0">© <span id="currentYear"></span> Pedro Henrique. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <!-- ══ Modal: Checkout ════════════════════════════════════════════════════ -->
    <div class="modal fade" id="checkoutModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content checkout-modal-content">

                <div class="modal-header checkout-modal-header">
                    <h3 class="modal-title h5">
                        <i class="bi bi-bag-check-fill me-2 text-accent"></i>Checkout
                    </h3>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Fechar"></button>
                </div>

                <div class="modal-body">
                    <!-- Resumo do curso -->
                    <div class="checkout-course-summary">
                        <div class="d-flex align-items-start gap-3">
                            <div class="checkout-icon">
                                <i class="bi bi-play-circle-fill"></i>
                            </div>
                            <div class="flex-grow-1">
                                <h4 id="checkoutCursoTitulo" class="checkout-curso-name">Curso</h4>
                                <p id="checkoutCursoDesc" class="checkout-curso-desc mb-2"></p>
                                <div class="d-flex gap-3 text-muted small">
                                    <span><i class="bi bi-bar-chart me-1"></i><span
                                            id="checkoutCursoNivel">-</span></span>
                                    <span><i class="bi bi-clock me-1"></i><span
                                            id="checkoutCursoHoras">-</span></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Método de pagamento -->
                    <div id="checkoutPaySection" class="checkout-pay-section mt-3">
                        <label class="form-label small text-muted mb-2">Método de pagamento</label>
                        <div class="checkout-methods">
                            <label class="checkout-method-option">
                                <input type="radio" name="checkoutMetodoRadio" value="PIX" id="checkoutMetodo"
                                    checked />
                                <span class="checkout-method-label">
                                    <i class="bi bi-qr-code me-2"></i>PIX
                                </span>
                            </label>
                            <label class="checkout-method-option">
                                <input type="radio" name="checkoutMetodoRadio" value="Cartão" />
                                <span class="checkout-method-label">
                                    <i class="bi bi-credit-card me-2"></i>Cartão
                                </span>
                            </label>
                            <label class="checkout-method-option">
                                <input type="radio" name="checkoutMetodoRadio" value="Boleto" />
                                <span class="checkout-method-label">
                                    <i class="bi bi-upc-scan me-2"></i>Boleto
                                </span>
                            </label>
                        </div>
                    </div>

                    <!-- Total -->
                    <div class="checkout-total-bar mt-3">
                        <span class="text-muted">Total</span>
                        <span id="checkoutTotal" class="checkout-total-value">R$ 0,00</span>
                    </div>
                </div>

                <div class="modal-footer checkout-modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btnConfirmarCompra" class="btn btn-primary" data-curso-id="">
                        <i class="bi bi-shield-check me-2"></i><span id="checkoutBtnLabel">Confirmar</span>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <!-- Entry point do Aluno -->
    <script type="module" src="./aluno.mjs"></script>
</body>

</html>
