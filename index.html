<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar — Plataforma de Cursos</title>
    <meta name="description"
        content="Acesse sua conta na plataforma de cursos online ou crie uma conta gratuita." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="./styles.css" />
</head>

<body class="login-body">

    <!-- Orbs de fundo decorativos -->
    <div class="login-orb login-orb-1" aria-hidden="true"></div>
    <div class="login-orb login-orb-2" aria-hidden="true"></div>
    <div class="login-orb login-orb-3" aria-hidden="true"></div>

    <div class="login-wrapper">

        <!-- Cabeçalho da marca -->
        <div class="login-brand-header text-center mb-4">
            <div class="login-logo">
                <span class="brand-accent">&lt;/</span><span class="brand-name">PH</span><span
                    class="brand-accent">&gt;</span>
            </div>
            <p class="login-tagline">Plataforma de Cursos Online</p>
        </div>

        <!-- Card de Login / Cadastro -->
        <div class="login-card">

            <!-- Tabs -->
            <div class="login-tabs" role="tablist">
                <button id="tabLogin" class="login-tab active" role="tab" aria-selected="true"
                    aria-controls="panelLogin">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
                <button id="tabCadastro" class="login-tab" role="tab" aria-selected="false"
                    aria-controls="panelCadastro">
                    <i class="bi bi-person-plus me-2"></i>Criar conta
                </button>
            </div>

            <!-- Alerta de erro/sucesso -->
            <div id="loginAlert" class="login-alert d-none" role="alert" aria-live="polite"></div>

            <!-- ── Painel: Login ─────────────────────────────────────────── -->
            <div id="panelLogin" role="tabpanel" aria-labelledby="tabLogin">
                <form id="loginForm" class="login-form" novalidate>
                    <div class="form-group-float">
                        <i class="bi bi-envelope field-icon"></i>
                        <input id="loginEmail" type="email" class="form-control login-input" placeholder=" "
                            autocomplete="email" required />
                        <label for="loginEmail" class="form-label login-label">E-mail</label>
                    </div>

                    <div class="form-group-float">
                        <i class="bi bi-lock field-icon"></i>
                        <input id="loginSenha" type="password" class="form-control login-input" placeholder=" "
                            autocomplete="current-password" minlength="3" required />
                        <label for="loginSenha" class="form-label login-label">Senha</label>
                        <button type="button" class="btn-toggle-pass" id="toggleLoginSenha"
                            aria-label="Mostrar/ocultar senha">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <button type="submit" id="btnEntrar" class="btn btn-primary w-100 login-submit">
                        <span class="btn-label">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                        </span>
                        <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>
                </form>

                <div class="login-hint mt-4">
                    <p class="text-muted small mb-1"><i class="bi bi-info-circle me-1"></i>Contas de demonstração:</p>
                    <div class="demo-accounts">
                        <button class="demo-btn" data-email="admin@plataforma.com" data-senha="0202">
                            <i class="bi bi-shield-fill-check me-1 text-accent"></i>Admin
                        </button>
                        <button class="demo-btn" data-email="aluno@plataforma.com" data-senha="0202">
                            <i class="bi bi-person-circle me-1"></i>Aluno
                        </button>
                    </div>
                </div>
            </div>

            <!-- ── Painel: Cadastro ─────────────────────────────────────── -->
            <div id="panelCadastro" class="d-none" role="tabpanel" aria-labelledby="tabCadastro">
                <form id="cadastroForm" class="login-form" novalidate>
                    <div class="form-group-float">
                        <i class="bi bi-person field-icon"></i>
                        <input id="cadastroNome" type="text" class="form-control login-input" placeholder=" "
                            autocomplete="name" required />
                        <label for="cadastroNome" class="form-label login-label">Nome completo</label>
                    </div>

                    <div class="form-group-float">
                        <i class="bi bi-envelope field-icon"></i>
                        <input id="cadastroEmail" type="email" class="form-control login-input" placeholder=" "
                            autocomplete="email" required />
                        <label for="cadastroEmail" class="form-label login-label">E-mail</label>
                    </div>

                    <div class="form-group-float">
                        <i class="bi bi-lock field-icon"></i>
                        <input id="cadastroSenha" type="password" class="form-control login-input" placeholder=" "
                            autocomplete="new-password" minlength="6" required />
                        <label for="cadastroSenha" class="form-label login-label">Senha (mín. 6 caracteres)</label>
                        <button type="button" class="btn-toggle-pass" id="toggleCadastroSenha"
                            aria-label="Mostrar/ocultar senha">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <button type="submit" id="btnCadastrar" class="btn btn-primary w-100 login-submit">
                        <span class="btn-label">
                            <i class="bi bi-person-check me-2"></i>Criar conta
                        </span>
                        <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>
                </form>
            </div>

        </div><!-- /.login-card -->

        <p class="text-center text-muted small mt-4">
            © <span id="currentYear"></span> Pedro Henrique &nbsp;·&nbsp;
            Engenharia da Computação — 7° período
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script type="module" src="./login.mjs"></script>
</body>

</html>
